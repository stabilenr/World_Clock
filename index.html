<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>World Clock - Narjis Stabile</title>
</head>

<body>
  <div class="container">
    <h1>World Clock</h1>

    <select>
      <option value="">Select a city..</option>
      <option value="New_York">New York</option>
      <option value="London">London</option>
      <option value="Tokyo">Tokyo</option>
    </select>
    <div class="city">
      <h2>Los Angeles <img src="https://flagcdn.com/w40/us.png" alt="US flag" /></h2>
      <div class="date">Monday, September 20, 2021</div>
      <div class="time">10:30:45 AM</div>
      <div class="city">
        <h2>New York <img src="https://flagcdn.com/w40/us.png" alt="US flag" /></h2>
        <div class="date">Monday, September 20, 2021</div>
        <div class="time">1:30:45 PM</div>
      </div>
    </div>
  </div>
  <footer>
    This project was coded with 💜 by Narjis Stabile
    and is
    <a href="https://github.com/stabilenr/World_Clock" target="_blank"> open sourced on GitHub</a>.
  </footer>
  <script src="javascript/index.js"></script>
</body>

</html>
