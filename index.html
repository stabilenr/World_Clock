<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.5.37/moment-timezone-with-data-1970-2030.min.js"></script>
  <title>World Clock - Narjis Stabile</title>
</head>

<body>
  <div class="container">
    <h1>World Clock</h1>

    <select id="city">
      <option value="">Select a city..</option>
      <option value="America/Los_Angeles">Los Angeles</option>
      <option value="Europe/Paris">Paris</option>
      <option value="Asia/Tokyo">Tokyo</option>
    </select>

    <div id="cities">
      <div class="city" id="los-angeles">
        <div>
          <h2>Los Angeles <img src="https://flagcdn.com/w40/us.png" alt="US flag" /></h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
      <div class="city" id="paris">
        <div>
          <h2>Paris <img src="https://flagcdn.com/w40/fr.png" alt="FR flag" /></h2>
          <div class="date"></div>
        </div>
        <div class="time"></div>
      </div>
    </div>
  </div>

  <footer>
    This project was coded with 💜 <strong>Narjis Stabile</strong> by
    and is
    <a href="https://github.com/stabilenr/World_Clock" target="_blank"> open sourced on GitHub</a>.
  </footer>
  <script src="javascript/index.js"></script>
</body>

</html>
